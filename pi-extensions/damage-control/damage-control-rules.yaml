version: 1

bash_tool_patterns:
  - id: rm-recursive-force
    pattern: '\brm\s+(-[^\s]*)*[rRf]'
    reason: rm with recursive/force flags
    action: ask

  - id: git-reset-hard
    pattern: '\bgit\s+reset\s+--hard\b'
    reason: git reset --hard discards uncommitted changes
    action: block

  - id: git-clean-force
    pattern: '\bgit\s+clean\s+(-[^\s]*)*[fd]'
    reason: git clean with force/directory flags removes files permanently
    action: block

  - id: git-push-force
    pattern: '\bgit\s+push\s+.*--force(?!-with-lease)'
    reason: force push without lease can destroy remote history
    action: block

  - id: git-push-delete
    pattern: '\bgit\s+push\s+\S+\s+--delete\b'
    reason: deletes remote branch
    action: ask

  - id: git-restore-all
    pattern: '\bgit\s+(checkout\s+--\s*\.|restore\s+\.)'
    reason: discards all unstaged changes in working tree
    action: ask

  - id: filesystem-format
    pattern: '\bmkfs\.'
    reason: filesystem formatting command
    action: block

  - id: dd-device-write
    pattern: '\bdd\s+.*of=/dev/'
    reason: dd writing to block device is destructive
    action: block

zero_access_paths:
  - .env
  - .env.local
  - .env.development
  - .env.production
  - .env.staging
  - .env.test
  - .env.*.local
  - "*.env"
  - ~/.ssh/
  - ~/.gnupg/
  - ~/.aws/
  - ~/.config/gcloud/
  - ~/.kube/
  - ~/.docker/
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"
  - "*.tfstate"
  - .terraform/
  - .git-credentials
  - ~/.git-credentials
  - "*serviceAccount*.json"
  - "*-credentials.json"
  - secrets.yaml
  - "*-secret.yaml"

read_only_paths:
  - /etc/
  - /usr/
  - /bin/
  - /sbin/
  - /boot/
  - /root/
  - ~/.bash_history
  - ~/.zsh_history
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - bun.lockb
  - Cargo.lock
  - go.sum
  - "*.lock"
  - dist/
  - build/
  - .next/
  - .nuxt/
  - node_modules/
  - __pycache__/
  - .venv/
  - venv/

no_delete_paths:
  - .git/
  - .gitignore
  - .gitattributes
  - .github/
  - README.md
  - README.*
  - LICENSE
  - LICENSE.*
  - CONTRIBUTING.md
  - CHANGELOG.md
  - SECURITY.md
  - Dockerfile
  - Dockerfile.*
  - .dockerignore
