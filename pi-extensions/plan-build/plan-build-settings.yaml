version: 1

planner:
  model: anthropic/claude-opus-4-6
  thinking: high
  # Built-in Pi tools are: read, write, edit, bash.
  # write and edit stay excluded so the planner remains read-only.
  # bash is enabled for read-only commands only; mutating commands are blocked by plan-build runtime checks.
  # plan_build is force-added by the extension regardless of this list.
  allowed_tools:
    - read
    - bash
    - websearch

builder:
  agent_name: builder
  model: openai/gpt-5.4
  thinking: medium
